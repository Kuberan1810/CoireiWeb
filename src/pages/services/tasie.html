<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap');

    :root {
        --gap: 2rem;
        --gray-100: #f1f5f9;
        --gray-200: #e2e8f0;
        --gray-300: #cbd5e1;
        --gray-400: #94a3b8;
        --gray-500: #64748b;
        --gray-700: #334155;
        --gray-800: #1e293b;
        --gray-900: #0f172a;
        --ink-950: #060b14;

        --neon-300: #86efac;
        --neon-400: #3ddc84;
        --neon-500: #16a34a;
        --neon-glow: rgba(61, 220, 132, 0.55);
    }

    * {
        box-sizing: border-box;
    }

    #tasie-root {
        width: 100%;
        min-height: 100vh;
        font-family: 'Share Tech Mono', monospace;
        background: var(--ink-950);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2.5rem;
        padding: 4rem 1rem 6rem;
        perspective: 300rem;
        overflow: hidden;
        position: relative;
    }

    .brand {
        position: relative;
        text-align: center;
        z-index: 2;
    }

    .brand .eyebrow {
        font-size: 0.7rem;
        letter-spacing: 0.45em;
        color: var(--neon-400);
        text-transform: uppercase;
        opacity: 0.85;
    }

    .brand h1 {
        font-family: 'Orbitron', sans-serif;
        font-weight: 900;
        font-size: clamp(2.4rem, 6vw, 3.6rem);
        letter-spacing: 0.12em;
        margin: 0.3rem 0 0.2rem;
        color: var(--gray-100);
        text-shadow: 0 0 12px var(--neon-glow), 0 0 40px rgba(61, 220, 132, 0.25);
    }

    .brand h1 span {
        color: var(--neon-400);
    }

    .brand p {
        font-size: 0.8rem;
        color: var(--gray-400);
        letter-spacing: 0.15em;
        margin: 0;
    }

    .brand .status {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 1rem;
        font-size: 0.7rem;
        color: var(--neon-300);
        letter-spacing: 0.2em;
    }

    .brand .status .dot {
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 50%;
        background: var(--neon-400);
        box-shadow: 0 0 8px var(--neon-400);
        animation: blink 1.6s ease-in-out infinite;
    }

    @keyframes blink {

        0%,
        100% {
            opacity: 1;
        }

        50% {
            opacity: 0.25;
        }
    }

    .keyboard {
        transform: rotateX(60deg) rotateZ(45deg);
        transform-style: preserve-3d;
        background: var(--gray-800);
        border-radius: 2rem;
        padding: var(--gap);
        box-shadow: inset 1rem 1rem 0 0.4rem var(--gray-500), 0 0 3rem rgba(61, 220, 132, 0.12);
        display: flex;
        gap: 0 var(--gap);
        position: relative;
        z-index: 2;
    }

    .shade {
        position: absolute;
        top: 0;
        left: 0;
        width: 90%;
        height: 5rem;
        background-image: linear-gradient(90deg, var(--gray-500) 50%, var(--ink-950));
        transform: rotateX(90deg) rotateX(14deg) translateX(10rem) translateY(-6rem) translateZ(-39rem);
        filter: blur(0.5rem);
    }

    .cover {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        background: transparent;
        border-radius: 2rem;
        box-shadow:
            inset -0.3rem -0.3rem 0.1rem 0.2rem var(--gray-100),
            inset -1rem -1rem 0 0.4rem var(--gray-300),
            inset -2rem -2rem 2rem -0.6rem var(--gray-500),
            0 0 #e2e8f0,
            0.3rem 0.3rem #e2e8f0,
            0.6rem 0.6rem #e2e8f0,
            0.9rem 0.9rem #e2e8f0,
            1.2rem 1.2rem #e2e8f0,
            1.5rem 1.5rem #e2e8f0,
            1.8rem 1.8rem #e2e8f0,
            2.1rem 2.1rem #e2e8f0,
            2.4rem 2.4rem #e2e8f0,
            2.7rem 2.7rem #e2e8f0,
            3.0rem 3.0rem #e2e8f0,
            3.3rem 3.3rem #e2e8f0,
            3.6rem 3.6rem #e2e8f0,
            3.9rem 3.9rem #e2e8f0,
            4.2rem 4.2rem #e2e8f0,
            4.5rem 4.5rem #e2e8f0,
            4.8rem 4.8rem #e2e8f0,
            5.1rem 5.1rem #e2e8f0,
            5.4rem 5.4rem #e2e8f0,
            5.7rem 5.7rem #e2e8f0,
            6.0rem 6.0rem #e2e8f0,
            6.3rem 6.3rem #e2e8f0,
            6.6rem 6.6rem #e2e8f0,
            6.9rem 6.9rem #e2e8f0,
            7.2rem 7.2rem #e2e8f0,
            7.5rem 7.5rem #e2e8f0,
            8rem 10rem 2rem rgba(6, 11, 20, 0.35),
            8rem 8rem 0.5rem rgba(6, 11, 20, 0.35);
    }

    .row {
        display: flex;
        gap: 0 var(--gap);
    }

    .row:not(:first-child) {
        filter: drop-shadow(2rem -0.5rem 0.5rem rgba(6, 11, 20, 0.45));
    }

    .row:not(:first-child) .key:not(:first-child) {
        filter: drop-shadow(-0.5rem 0.5rem 0.5rem rgba(6, 11, 20, 0.45));
    }

    .row>.key.span {
        flex: 1;
    }

    .row>.key.span .side {
        width: 120%;
        height: 237%;
        transform: rotateZ(45deg) translate(24%, -14%) skew(337deg);
        background-image: linear-gradient(var(--gray-100) 25%, var(--gray-300) 30%);
    }

    .row>.key.span .top::before {
        transform: translate(5%, 5%);
    }

    .row>.key.span .top::after {
        background-image: linear-gradient(-25deg, transparent 45%, var(--gray-200) 55%);
    }

    .column {
        display: flex;
        flex-direction: column;
        gap: var(--gap) 0;
    }

    .column>.key.span {
        flex: 1;
    }

    .column>.key.span .side {
        width: 220%;
        height: 103%;
        transform: rotateZ(45deg) translate(27%, 17%) skew(22deg);
        background-image: linear-gradient(var(--neon-300) 65%, var(--neon-500) 78%);
    }

    .column>.key.span .top::before {
        background-color: var(--neon-400);
        transform: translate(5%, 5%);
    }

    .column>.key.span .top::after {
        background-image: linear-gradient(291deg, transparent 45%, var(--neon-400) 50%);
    }

    .column:not(:first-child) {
        filter: drop-shadow(-0.5rem 0.5rem 0.5rem rgba(6, 11, 20, 0.45));
    }

    .key {
        position: relative;
        width: 6rem;
        height: 6rem;
        transform: translateX(-3rem) translateY(-3rem);
        transform-style: preserve-3d;
        user-select: none;
        cursor: pointer;
        transition: transform 0.1s ease-out, filter 0.15s ease-out;
    }

    .key:hover {
        transform: translateX(-3.4rem) translateY(-3.4rem);
        filter: brightness(1.12) drop-shadow(0 0 0.6rem var(--neon-glow));
    }

    .key:hover .char {
        color: var(--neon-300);
    }

    .key.active {
        transform: translateX(-1rem) translateY(-1rem) !important;
        filter: brightness(0.94) !important;
    }

    .key.active .char {
        color: var(--neon-400);
        text-shadow:
            0.05rem 0.0rem 0 var(--gray-400),
            0.05rem 0.1rem 0 var(--ink-950),
            0 0 0.6rem var(--neon-glow);
    }

    .key.span.active .side {
        filter: brightness(1.15);
    }

    .char {
        position: absolute;
        font-family: 'Share Tech Mono', monospace;
        font-size: 2.6rem;
        letter-spacing: 0.02em;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        color: var(--gray-500);
        transition: color 0.15s ease-out;
        text-shadow:
            0.05rem 0.0rem 0 var(--gray-400),
            0.05rem 0.1rem 0 var(--ink-950),
            0.1rem 0.05rem 0 var(--gray-400),
            0.1rem 0.15rem 0 var(--ink-950),
            0.15rem 0.1rem 0 var(--gray-400),
            0.15rem 0.2rem 0 var(--ink-950),
            0.2rem 0.15rem 0 var(--gray-400),
            0.2rem 0.25rem 0 var(--ink-950),
            0.25rem 0.2rem 0 var(--gray-400),
            0.25rem 0.3rem 0 var(--ink-950);
    }

    .char.word {
        font-size: 1.2rem;
        letter-spacing: 0.06em;
    }

    .char.sym {
        font-size: 1.8rem;
    }

    .side {
        position: absolute;
        width: 250%;
        height: 140%;
        background-image: linear-gradient(var(--gray-100) 45%, var(--gray-300) 55%);
        border-radius: 1rem;
        transform: rotateZ(45deg) translate(19%, 28%);
    }

    .top {
        position: absolute;
        width: 100%;
        height: 100%;
    }

    .top::before {
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        background-color: var(--gray-200);
        border-radius: 0.8em;
        filter: blur(0.3rem);
        transform: translate(10%, 10%);
    }

    .top::after {
        content: '';
        position: absolute;
        width: 105%;
        height: 105%;
        background-image: linear-gradient(-45deg, transparent 45%, var(--gray-200) 55%);
        border-radius: 0.8rem;
        box-shadow: inset -0.2rem -0.2rem 0.5rem -0.2rem white, 0.2rem 0.2rem 0.5rem -0.2rem white;
    }

    .hint {
        position: relative;
        z-index: 2;
        color: var(--gray-500);
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        text-align: center;
    }

    .hint b {
        color: var(--neon-400);
    }
</style>

<div id="tasie-root">
    <div class="brand">
        <div class="eyebrow">AI Code Editor // Secure Shell</div>
        <h1>TAS<span>IE</span></h1>
        <p>Encrypted keys for an encrypted craft</p>
        <div class="status"><span class="dot"></span> SESSION SECURE</div>
    </div>

    <div class="keyboard" id="tasie-keyboard">
        <div class="column">
            <div class="row">
                <div class="key" data-key="t">
                    <div class="side"></div>
                    <div class="top"></div>
                    <div class="char">T</div>
                </div>
                <div class="key" data-key="a">
                    <div class="side"></div>
                    <div class="top"></div>
                    <div class="char">A</div>
                </div>
                <div class="key" data-key="s">
                    <div class="side"></div>
                    <div class="top"></div>
                    <div class="char">S</div>
                </div>
            </div>
            <div class="row">
                <div class="key" data-key="i">
                    <div class="side"></div>
                    <div class="top"></div>
                    <div class="char">I</div>
                </div>
                <div class="key" data-key="e">
                    <div class="side"></div>
                    <div class="top"></div>
                    <div class="char">E</div>
                </div>
                <div class="key" data-key="brace">
                    <div class="side"></div>
                    <div class="top"></div>
                    <div class="char sym">&lt;/&gt;</div>
                </div>
            </div>
            <div class="row">
                <div class="key" data-key="hex">
                    <div class="side"></div>
                    <div class="top"></div>
                    <div class="char sym">0x</div>
                </div>
                <div class="key" data-key="curly">
                    <div class="side"></div>
                    <div class="top"></div>
                    <div class="char sym">{ }</div>
                </div>
                <div class="key" data-key="colons">
                    <div class="side"></div>
                    <div class="top"></div>
                    <div class="char sym">::</div>
                </div>
            </div>
            <div class="row">
                <div class="key span" data-key="prompt">
                    <div class="side"></div>
                    <div class="top"></div>
                    <div class="char sym">&gt;_</div>
                </div>
                <div class="key" data-key="dot">
                    <div class="side"></div>
                    <div class="top"></div>
                    <div class="char">.</div>
                </div>
            </div>
        </div>
        <div class="column">
            <div class="key span" data-key="scan">
                <div class="side"></div>
                <div class="top"></div>
                <div class="char word">SCAN</div>
            </div>
            <div class="key span" data-key="lock">
                <div class="side"></div>
                <div class="top"></div>
                <div class="char word">LOCK</div>
            </div>
        </div>
        <div class="shade"></div>
        <div class="cover"></div>
    </div>

    <div class="hint">HOVER to inspect a key &nbsp;·&nbsp; CLICK / TAP to press it &nbsp;·&nbsp; <b>SCAN</b> and
        <b>LOCK</b> trigger the security relay tone
    </div>
</div>

<script>
    (function () {
        const root = document.getElementById('tasie-root');
        const keys = root.querySelectorAll('.key');

        let audioCtx = null;
        function beep(freq) {
            try {
                audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.09);
                osc.connect(gain).connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } catch (e) { /* audio unsupported, fail silently */ }
        }

        keys.forEach((key) => {
            const isSecurity = key.dataset.key === 'scan' || key.dataset.key === 'lock';
            const press = (e) => {
                e.preventDefault();
                key.classList.add('active');
                clickSound();
            };
            const release = () => key.classList.remove('active');

            key.addEventListener('mousedown', press);
            key.addEventListener('mouseup', release);
            key.addEventListener('mouseleave', release);
            key.addEventListener('touchstart', press, { passive: false });
            key.addEventListener('touchend', release);
        });
    })();

    let audioCtx = null;

    function clickSound() {
        try {
            audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();

            const now = audioCtx.currentTime;

            // Noise burst
            const bufferSize = audioCtx.sampleRate * 0.03;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);

            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / bufferSize * 12);
            }

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;

            const filter = audioCtx.createBiquadFilter();
            filter.type = "highpass";
            filter.frequency.value = 1800;

            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.18, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.03);

            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);

            noise.start(now);
            noise.stop(now + 0.03);
        } catch (e) { }
    }
</script>
