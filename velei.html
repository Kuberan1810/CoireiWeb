<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Interface</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background-effects">
        <div class="bg-blob bg-blob--blue"></div>
        <div class="bg-blob bg-blob--pink"></div>
        <div class="bg-blob bg-blob--yellow"></div>
        <div class="bg-blob bg-blob--green"></div>
    </div>

    <main class="app-container">
        <div class="panel">
            <header class="panel__header">
                <button class="project-selector" aria-label="Select project">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <span class="project-selector__text">new-job</span>
                    <svg class="icon icon--small" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </button>
            </header>

            <section class="prompt-box">
                <div class="prompt-box__main">
                    <input type="text" class="prompt-box__input" placeholder="Search jobs suitable for you"
                        aria-label="Prompt input">

                    <div class="prompt-box__controls">
                        <button class="model-selector" aria-label="Select model">
                            <svg class="icon icon--small" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            <span class="model-selector__text">Velei - 3.5 Flash</span>
                            <svg class="icon icon--small" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </button>

                        <button class="mic-button" aria-label="Voice input">
                            <svg class="icon icon--small" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                                <line x1="12" y1="19" x2="12" y2="23"></line>
                                <line x1="8" y1="23" x2="16" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                </div>

                <footer class="prompt-box__footer">
                    <div class="context-group">
                        <button class="context-button context-button--active" aria-haspopup="true" aria-expanded="true">
                            <svg class="icon icon--small" viewBox="0 0 16 16" fill="none" stroke="currentColor"
                                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 14V2"></path>
                                <path d="M4 9c3 0 5-1 5-4V2"></path>
                                <path d="M7 4l2-2 2 2"></path>
                            </svg>
                            <span class="context-button__text">New Workspace</span>
                            <svg class="icon icon--small" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="18 15 12 9 6 15"></polyline>
                            </svg>
                        </button>

                        <div class="dropdown-menu">
                            <button class="dropdown-item">
                                <svg class="icon icon--small" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                                    <line x1="8" y1="21" x2="16" y2="21"></line>
                                    <line x1="12" y1="17" x2="12" y2="21"></line>
                                </svg>
                                <span>Remote</span>
                            </button>
                            <button class="dropdown-item">
                                <svg class="icon icon--small" viewBox="0 0 16 16" fill="none" stroke="currentColor"
                                    stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M4 14V2"></path>
                                    <path d="M4 9c3 0 5-1 5-4V2"></path>
                                    <path d="M7 4l2-2 2 2"></path>
                                </svg>
                                <span>Hybrid</span>
                            </button>
                            <button class="dropdown-item">
                                <svg class="icon icon--small" viewBox="0 0 16 16" fill="none" stroke="currentColor"
                                    stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M4 14V2"></path>
                                    <path d="M4 9c3 0 5-1 5-4V2"></path>
                                    <path d="M7 4l2-2 2 2"></path>
                                </svg>
                                <span>On-site</span>
                            </button>
                        </div>
                    </div>

                    <button class="context-button">
                        <svg class="icon icon--small" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="6" y1="3" x2="6" y2="15"></line>
                            <circle cx="18" cy="6" r="3"></circle>
                            <circle cx="6" cy="18" r="3"></circle>
                            <path d="M18 9a9 9 0 0 1-9 9"></path>
                        </svg>
                        <span class="context-button__text">main</span>
                        <svg class="icon icon--small" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </button>
                </footer>
            </section>
        </div>
    </main>

    <div class="dark-section">
        <!-- Stars background simulated in CSS -->
    </div>
</body>

</html>




<style>
    :root {
        /* Colors */
        --color-bg-base: #f8f9fa;
        --color-panel-bg: #f3f3f3;
        --color-input-bg: #ffffff;
        --color-footer-bg: #e5e5e5;
        --color-dropdown-bg: #f8f8f8;

        --color-text-primary: #1a1a1a;
        --color-text-secondary: #5e5e5e;
        --color-text-placeholder: #8e8e8e;

        --color-border-light: rgba(0, 0, 0, 0.05);
        --color-border-dropdown: rgba(0, 0, 0, 0.08);

        --color-hover-bg: rgba(0, 0, 0, 0.04);
        --color-mic-bg: #e5e5e5;

        /* Gradients */
        --grad-blue: rgba(180, 210, 255, 0.6);
        --grad-pink: rgba(255, 200, 220, 0.5);
        --grad-yellow: rgba(255, 240, 180, 0.5);
        --grad-green: rgba(200, 240, 210, 0.5);

        /* Typography */
        --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --font-size-base: 14px;
        --font-size-sm: 13px;

        /* Spacing */
        --spacing-xs: 4px;
        --spacing-sm: 8px;
        --spacing-md: 12px;
        --spacing-lg: 16px;
        --spacing-xl: 24px;

        /* Radii */
        --radius-sm: 8px;
        --radius-md: 16px;
        --radius-lg: 24px;
        --radius-xl: 32px;

        /* Shadows */
        --shadow-panel: 0 20px 40px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0, 0, 0, 0.02);
        --shadow-dropdown: 0 8px 24px rgba(0, 0, 0, 0.12), 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    /* Reset & Base */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: var(--font-family);
        background-color: var(--color-bg-base);
        color: var(--color-text-primary);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
        position: relative;
    }

    button {
        background: none;
        border: none;
        cursor: pointer;
        font-family: inherit;
        color: inherit;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: background-color 0.2s ease, color 0.2s ease;
    }

    input {
        font-family: inherit;
    }

    /* Background Effects */
    .background-effects {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        overflow: hidden;
        background-color: #f0f4f8;
    }

    .bg-blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.8;
    }

    .bg-blob--blue {
        top: -10%;
        left: -10%;
        width: 60vw;
        height: 60vw;
        background: var(--grad-blue);
    }

    .bg-blob--pink {
        top: 20%;
        left: -20%;
        width: 50vw;
        height: 50vw;
        background: var(--grad-pink);
    }

    .bg-blob--yellow {
        bottom: -10%;
        right: -10%;
        width: 50vw;
        height: 50vw;
        background: var(--grad-yellow);
    }

    .bg-blob--green {
        bottom: -20%;
        left: 20%;
        width: 60vw;
        height: 60vw;
        background: var(--grad-green);
    }

    /* Layout */
    .app-container {
        flex: 1;
        display: flex;
        justify-content: center;
        padding: 40px 20px;
        position: relative;
        z-index: 1;
    }

    /* Main Panel */
    .panel {
        background-color: var(--color-panel-bg);
        width: 100%;
        max-width: 720px;
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-panel);
        padding: 60px 40px;
        display: flex;
        flex-direction: column;
        gap: var(--spacing-xl);
        border: 1px solid rgba(255, 255, 255, 0.4);
    }

    /* Header / Project Selector */
    .panel__header {
        display: flex;
        align-items: center;
    }

    .project-selector {
        display: flex;
        align-items: center;
        gap: var(--spacing-sm);
        color: var(--color-text-primary);
        font-size: var(--font-size-base);
        font-weight: 500;
        padding: var(--spacing-xs) var(--spacing-sm);
        border-radius: var(--radius-sm);
        margin-left: -8px;
        /* Align visually with input */
    }

    .project-selector:hover {
        background-color: var(--color-hover-bg);
    }

    /* Prompt Box */
    .prompt-box {
        display: flex;
        flex-direction: column;
        border-radius: var(--radius-md);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        overflow: visible;
        /* For dropdown */
    }

    .prompt-box__main {
        background-color: var(--color-input-bg);
        padding: var(--spacing-lg);
        border-top-left-radius: var(--radius-md);
        border-top-right-radius: var(--radius-md);
        display: flex;
        flex-direction: column;
        gap: var(--spacing-md);
    }

    .prompt-box__input {
        width: 100%;
        border: none;
        outline: none;
        font-size: 15px;
        color: var(--color-text-primary);
        background: transparent;
    }

    .prompt-box__input::placeholder {
        color: var(--color-text-placeholder);
    }

    .prompt-box__controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .model-selector {
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--color-text-secondary);
        font-size: var(--font-size-sm);
        padding: 4px 8px;
        border-radius: var(--radius-sm);
        margin-left: -8px;
    }

    .model-selector:hover {
        background-color: var(--color-hover-bg);
        color: var(--color-text-primary);
    }

    .mic-button {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background-color: var(--color-mic-bg);
        color: var(--color-text-secondary);
    }

    .mic-button:hover {
        background-color: #d4d4d8;
        color: var(--color-text-primary);
    }

    /* Prompt Box Footer */
    .prompt-box__footer {
        background-color: var(--color-footer-bg);
        padding: var(--spacing-sm) var(--spacing-lg);
        border-bottom-left-radius: var(--radius-md);
        border-bottom-right-radius: var(--radius-md);
        display: flex;
        align-items: center;
        gap: var(--spacing-lg);
    }

    .context-group {
        position: relative;
    }

    .context-button {
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--color-text-secondary);
        font-size: var(--font-size-sm);
        padding: 4px 8px;
        border-radius: var(--radius-sm);
        margin-left: -8px;
    }

    .context-button:hover {
        background-color: rgba(0, 0, 0, 0.05);
        color: var(--color-text-primary);
    }

    .context-button--active {
        color: var(--color-text-secondary);
    }

    /* Dropdown Menu */
    .dropdown-menu {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        background-color: var(--color-dropdown-bg);
        border-radius: var(--radius-sm);
        box-shadow: var(--shadow-dropdown);
        padding: var(--spacing-xs);
        min-width: 160px;
        display: flex;
        flex-direction: column;
        z-index: 10;
        border: 1px solid var(--color-border-dropdown);
    }

    .dropdown-item {
        display: flex;
        align-items: center;
        gap: var(--spacing-sm);
        width: 100%;
        padding: 8px 12px;
        font-size: var(--font-size-sm);
        color: var(--color-text-primary);
        border-radius: 6px;
        justify-content: flex-start;
    }

    .dropdown-item:hover {
        background-color: var(--color-hover-bg);
    }

    .dropdown-item .icon {
        color: var(--color-text-secondary);
    }

    /* Icons */
    .icon {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
    }

    .icon--small {
        width: 14px;
        height: 14px;
    }

    /* Dark Section (Bottom) */
    .dark-section {
        height: 120px;
        background-color: #000000;
        width: 100%;
        border-top-left-radius: 40px;
        border-top-right-radius: 40px;
        position: relative;
        overflow: hidden;
        margin-top: -20px;
        z-index: 2;
        /* Simulate stars */
        background-image:
            radial-gradient(1px 1px at 20px 30px, #fff, rgba(0, 0, 0, 0)),
            radial-gradient(1px 1px at 40px 70px, #fff, rgba(0, 0, 0, 0)),
            radial-gradient(1.5px 1.5px at 90px 40px, #fff, rgba(0, 0, 0, 0)),
            radial-gradient(1px 1px at 160px 90px, #fff, rgba(0, 0, 0, 0)),
            radial-gradient(2px 2px at 240px 30px, #fff, rgba(0, 0, 0, 0)),
            radial-gradient(1px 1px at 300px 80px, #fff, rgba(0, 0, 0, 0)),
            radial-gradient(1px 1px at 400px 40px, #fff, rgba(0, 0, 0, 0)),
            radial-gradient(1.5px 1.5px at 500px 90px, #fff, rgba(0, 0, 0, 0)),
            radial-gradient(1px 1px at 600px 20px, #fff, rgba(0, 0, 0, 0)),
            radial-gradient(1px 1px at 700px 70px, #fff, rgba(0, 0, 0, 0)),
            radial-gradient(2px 2px at 800px 40px, #fff, rgba(0, 0, 0, 0)),
            radial-gradient(1px 1px at 900px 90px, #fff, rgba(0, 0, 0, 0));
        background-repeat: repeat-x;
        background-size: 1000px 120px;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .panel {
            padding: 30px 20px;
            border-radius: var(--radius-lg);
        }

        .app-container {
            padding: 20px 10px;
        }
    }
</style>
